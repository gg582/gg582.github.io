---
layout: page
title: Relations
background: '/img/bg-devnote.jpg'
---

<style>
  #canvas-container {
    width: 100%;
    height: 600px;
    background-color: #f8f9fa;
    border: 1px solid #dee2e6;
    border-radius: 8px;
    overflow: hidden;
    position: relative;
    margin-top: 20px;
  }
  canvas {
    display: block;
    width: 100%;
    height: 100%;
  }
  #tooltip {
    position: absolute;
    background: rgba(0, 0, 0, 0.8);
    color: white;
    padding: 5px 10px;
    border-radius: 4px;
    pointer-events: none;
    font-size: 14px;
    display: none;
    z-index: 10;
  }
</style>

<div class="container">
  <div class="row">
    <div class="col-lg-10 col-md-10 mx-auto">
      <h2>Document Relations Mesh</h2>
      <p>This graph shows the relationships between posts. Calculated with WebAssembly (Emscripten).</p>
      <div id="canvas-container">
        <div id="tooltip"></div>
        <canvas id="relationCanvas"></canvas>
      </div>
    </div>
  </div>
</div>

<script src="{{ '/assets/relations_engine.js' | relative_url }}"></script>
<script>
  const posts = [
    {% for post in site.documents %}
      {% if post.title and post.url %}
      {
        id: "{{ post.path | escape }}",
        title: "{{ post.title | escape }}",
        url: "{{ post.url | relative_url }}",
        related: [
          {% if post.relationships.related %}
            {% for r in post.relationships.related %}
              "{{ r | escape }}",
            {% endfor %}
          {% endif %}
        ],
        references: [
          {% if post.relationships.references %}
            {% for r in post.relationships.references %}
              "{{ r | escape }}",
            {% endfor %}
          {% endif %}
        ],
        prerequisite: [
          {% if post.relationships.prerequisite %}
            {% for r in post.relationships.prerequisite %}
              "{{ r | escape }}",
            {% endfor %}
          {% endif %}
        ]
      },
      {% endif %}
    {% endfor %}
  ];

  const nodes = [];
  const nodeMap = {};
  
  posts.forEach(post => {
    if (post.id && nodeMap[post.id] === undefined) {
      nodeMap[post.id] = nodes.length;
      nodes.push({
        ...post,
        x: 0,
        y: 0,
        vx: 0,
        vy: 0
      });
    }
  });
  const edges = [];
  posts.forEach(post => {
    const sourceIdx = nodeMap[post.id];
    if (sourceIdx !== undefined) {
      const addEdges = (relArray) => {
        relArray.forEach(targetId => {
          const targetIdx = nodeMap[targetId];
          if (targetIdx !== undefined) {
            if (!edges.some(e => (e.source === sourceIdx && e.target === targetIdx) || (e.source === targetIdx && e.target === sourceIdx))) {
                edges.push({ source: sourceIdx, target: targetIdx });
            }
          }
        });
      };
      addEdges(post.related);
      addEdges(post.references);
      addEdges(post.prerequisite);
    }
  });
  const connectedNodes = new Array(nodes.length).fill(false);
  edges.forEach(edge => {
    connectedNodes[edge.source] = true;
    connectedNodes[edge.target] = true;
  });

  const canvas = document.getElementById('relationCanvas');
  const ctx = canvas.getContext('2d');
  const tooltip = document.getElementById('tooltip');
  
  let width = canvas.width = canvas.parentElement.clientWidth;
  let height = canvas.height = canvas.parentElement.clientHeight;
  let viewScale = 1;
  let viewOffsetX = 0;
  let viewOffsetY = 0;
  const MIN_SCALE = 0.35;
  const MAX_SCALE = 4;
  const ZOOM_SENSITIVITY = 0.0015;
  const NODE_RADIUS = 6;
  const HIT_RADIUS = 10;
  const HIT_RADIUS_SQ = HIT_RADIUS * HIT_RADIUS;
  const LABEL_VERTICAL_PADDING = 8;

  function clamp(v, min, max) {
    return Math.max(min, Math.min(max, v));
  }

  function worldToScreenX(x) {
    return x * viewScale + viewOffsetX;
  }

  function worldToScreenY(y) {
    return y * viewScale + viewOffsetY;
  }

  function getHitNode(mx, my) {
    for (let i = nodes.length - 1; i >= 0; i--) {
      const node = nodes[i];
      if (!node.visible) continue;

      const dx = mx - node.screenX;
      const dy = my - node.screenY;
      if (dx * dx + dy * dy < HIT_RADIUS_SQ) {
        return node;
      }

      const b = node.labelBounds;
      if (b && mx >= b.left && mx <= b.right && my >= b.top && my <= b.bottom) {
        return node;
      }
    }
    return null;
  }

  window.addEventListener('resize', () => {
    width = canvas.width = canvas.parentElement.clientWidth;
    height = canvas.height = canvas.parentElement.clientHeight;
  });

  Module.onRuntimeInitialized = () => {
    const numNodes = nodes.length;
    const numEdges = edges.length;

    if (numNodes === 0) return;

    const pxPtr = Module._malloc(numNodes * 4);
    const pyPtr = Module._malloc(numNodes * 4);
    const vxPtr = Module._malloc(numNodes * 4);
    const vyPtr = Module._malloc(numNodes * 4);
    const edgeSrcPtr = Module._malloc(numEdges * 4);
    const edgeDstPtr = Module._malloc(numEdges * 4);

    const pxArray = new Float32Array(HEAPF32.buffer, pxPtr, numNodes);
    const pyArray = new Float32Array(HEAPF32.buffer, pyPtr, numNodes);
    const vxArray = new Float32Array(HEAPF32.buffer, vxPtr, numNodes);
    const vyArray = new Float32Array(HEAPF32.buffer, vyPtr, numNodes);
    const edgeSrcArray = new Int32Array(HEAP32.buffer, edgeSrcPtr, numEdges);
    const edgeDstArray = new Int32Array(HEAP32.buffer, edgeDstPtr, numEdges);

    for (let i = 0; i < numNodes; i++) {
      pxArray[i] = Math.random() * width;
      pyArray[i] = Math.random() * height;
      vxArray[i] = 0;
      vyArray[i] = 0;
    }

    for (let i = 0; i < numEdges; i++) {
      edgeSrcArray[i] = edges[i].source;
      edgeDstArray[i] = edges[i].target;
    }

    function animate() {
      Module._compute_layout(pxPtr, pyPtr, vxPtr, vyPtr, numNodes, edgeSrcPtr, edgeDstPtr, numEdges, width, height);

      for (let i = 0; i < numNodes; i++) {
        nodes[i].x = pxArray[i];
        nodes[i].y = pyArray[i];
        nodes[i].visible = connectedNodes[i];
        if (nodes[i].visible) {
          nodes[i].screenX = worldToScreenX(nodes[i].x);
          nodes[i].screenY = worldToScreenY(nodes[i].y);
        } else {
          nodes[i].labelBounds = null;
        }
      }

      ctx.clearRect(0, 0, width, height);
      
      ctx.strokeStyle = 'rgba(150, 150, 150, 0.5)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      edges.forEach(edge => {
        const src = nodes[edge.source];
        const dst = nodes[edge.target];
        if (!src.visible || !dst.visible) return;
        ctx.moveTo(src.screenX, src.screenY);
        ctx.lineTo(dst.screenX, dst.screenY);
      });
      ctx.stroke();

      ctx.fillStyle = '#333';
      ctx.font = '12px sans-serif';
      ctx.textBaseline = 'middle';
      nodes.forEach((node, i) => {
        if (!connectedNodes[i]) {
          return;
        }
        const sx = node.screenX;
        const sy = node.screenY;

        ctx.beginPath();
        ctx.arc(sx, sy, NODE_RADIUS, 0, Math.PI * 2);
        ctx.fillStyle = '#007bff';
        ctx.fill();
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.fillStyle = '#333';
        const labelX = sx + 10;
        const labelY = sy;
        ctx.fillText(node.title, labelX, labelY);
        const labelWidth = ctx.measureText(node.title).width;
        node.labelBounds = {
          left: labelX,
          right: labelX + labelWidth,
          top: labelY - LABEL_VERTICAL_PADDING,
          bottom: labelY + LABEL_VERTICAL_PADDING
        };
      });

      requestAnimationFrame(animate);
    }

    animate();
  };

  canvas.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const hovered = getHitNode(mx, my);

    if (hovered) {
      canvas.style.cursor = 'pointer';
      tooltip.style.display = 'block';
      tooltip.style.left = (mx + 10) + 'px';
      tooltip.style.top = (my + 10) + 'px';
      tooltip.textContent = hovered.title;
    } else {
      canvas.style.cursor = 'default';
      tooltip.style.display = 'none';
    }
  });

  canvas.addEventListener('wheel', (e) => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;

    const worldX = (mx - viewOffsetX) / viewScale;
    const worldY = (my - viewOffsetY) / viewScale;
    const zoomFactor = Math.exp(-e.deltaY * ZOOM_SENSITIVITY);
    const nextScale = clamp(viewScale * zoomFactor, MIN_SCALE, MAX_SCALE);

    viewOffsetX = mx - worldX * nextScale;
    viewOffsetY = my - worldY * nextScale;
    viewScale = nextScale;
  }, { passive: false });

  canvas.addEventListener('click', (e) => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const clicked = getHitNode(mx, my);
    if (clicked) {
      window.location.href = clicked.url;
    }
  });

</script>
